<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rivet Console</title>
    <meta name="description" content="Rivet AI control panel" />

    <!-- PWA / icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0e0e10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Telegram Mini App SDK — must load before app JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!--
      Theme flash prevention.
      Reads Telegram's colorScheme before React mounts
      and applies .dark to <html> immediately.
    -->
    <script>
      (function () {
        try {
          var scheme = window.Telegram?.WebApp?.colorScheme || 'dark'
          if (scheme === 'dark') document.documentElement.classList.add('dark')
        } catch (_) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
